services:
  claudio:
    image: ghcr.io/lmrisdal/claudio:latest
    container_name: claudio
    user: "1000:1000"
    ports:
      - "8080:8080"
    volumes:
      - claudio-data:/config
      - /path/to/games:/games:ro
    environment:
      - CLAUDIO_IGDB_CLIENT_ID=${IGDB_CLIENT_ID}
      - CLAUDIO_IGDB_CLIENT_SECRET=${IGDB_CLIENT_SECRET}
      - CLAUDIO_STEAMGRIDDB_API_KEY=${STEAMGRIDDB_KEY}
      - CLAUDIO_JWT_SECRET=${JWT_SECRET}
      - CLAUDIO_PROXY_AUTH_HEADER=Remote-User
      - CLAUDIO_PORT=8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  claudio-data:
