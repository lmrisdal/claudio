name: Build Desktop App

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "src/claudio-desktop/**"
      - "frontend/**"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc
            rust-targets: ""
            uninstaller-target: x86_64-pc-windows-msvc
          - platform: windows-latest
            args: --target aarch64-pc-windows-msvc
            rust-targets: aarch64-pc-windows-msvc
            uninstaller-target: aarch64-pc-windows-msvc
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "22"
          working-directory: frontend
          cache: true
          run-install: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Rust cross-compilation targets
        if: matrix.rust-targets != ''
        shell: bash
        run: |
          IFS=',' read -ra TARGETS <<< "${{ matrix.rust-targets }}"
          for target in "${TARGETS[@]}"; do
            rustup target add "$target"
          done

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src/claudio-desktop -> target

      - name: Build uninstaller (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          cd src/claudio-uninstaller
          cargo build --release --target ${{ matrix.uninstaller-target }}
          mkdir -p target/release
          cp target/${{ matrix.uninstaller-target }}/release/claudio-game-uninstaller.exe target/release/claudio-game-uninstaller.exe

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: src/claudio-desktop
          tauriScript: ../../frontend/node_modules/.bin/tauri
          args: ${{ matrix.args }}
          tagName: v__VERSION__
          releaseName: Claudio v__VERSION__
          releaseBody: See the assets below to download and install Claudio for your platform.
          releaseDraft: true
          prerelease: false
