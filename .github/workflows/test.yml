name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - run: dotnet restore tests/Claudio.Api.Tests/Claudio.Api.Tests.csproj

      - run: dotnet build tests/Claudio.Api.Tests/Claudio.Api.Tests.csproj --no-restore

      - name: Run tests with coverage
        run: |
          dotnet test --project tests/Claudio.Api.Tests --no-build \
            --results-directory $RUNNER_TEMP/TestResults \
            -- --coverage --coverage-output-format cobertura

      - name: Generate coverage report
        if: always()
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: ${{ runner.temp }}/TestResults/*.cobertura.xml
          targetdir: ${{ runner.temp }}/TestResults/report
          reporttypes: MarkdownSummaryGithub;Html

      - name: Add coverage to job summary
        if: always()
        run: cat $RUNNER_TEMP/TestResults/report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ runner.temp }}/TestResults/report
          retention-days: 30

  desktop-tests:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build uninstaller (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          cargo build --release -p claudio-uninstaller --target x86_64-pc-windows-msvc
          mkdir -p target/release
          cp target/x86_64-pc-windows-msvc/release/claudio-game-uninstaller.exe target/release/claudio-game-uninstaller.exe

      - name: Run desktop Rust tests
        run: cargo test --workspace
