services:
  claudio:
    image: ghcr.io/lmrisdal/claudio:latest
    container_name: claudio
    ports:
      - "8080:8080"
    volumes:
      - claudio-config:/config
      - /path/to/games:/games:ro
    user: "1000:1000"
    environment:
      - CLAUDIO_DB_PROVIDER=postgres
      - CLAUDIO_DB_POSTGRES=postgres://claudio:secret@db/claudio
      # - CLAUDIO_PORT=8080
      # Multiple origins should be comma-separated with no spaces.
      # - CLAUDIO_BROWSER_ORIGINS=https://claudio.example.com,https://staging.example.com
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_DB=claudio
      - POSTGRES_USER=claudio
      - POSTGRES_PASSWORD=secret
    user: "1000:1000"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claudio -d claudio"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  claudio-config:
  postgres-data:
