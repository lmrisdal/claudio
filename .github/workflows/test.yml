name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Run API Rust tests
        run: cargo test -p claudio-api-tests

  desktop-tests:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build uninstaller (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          cargo build --release -p claudio-uninstaller --target x86_64-pc-windows-msvc
          mkdir -p target/release
          cp target/x86_64-pc-windows-msvc/release/claudio-game-uninstaller.exe target/release/claudio-game-uninstaller.exe

      - name: Run desktop Rust tests
        run: cargo test --workspace
