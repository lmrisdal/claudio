name: Build Desktop App

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "src/claudio-desktop/**"
      - "frontend/**"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc
            rust-targets: ""
          # - platform: windows-latest
          #   args: --target aarch64-pc-windows-msvc
          #   rust-targets: aarch64-pc-windows-msvc
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Rust cross-compilation targets
        if: matrix.rust-targets != ''
        run: |
          IFS=',' read -ra TARGETS <<< "${{ matrix.rust-targets }}"
          for target in "${TARGETS[@]}"; do
            rustup target add "$target"
          done

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src/claudio-desktop -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src/claudio-desktop
          tauriScript: ../../frontend/node_modules/.bin/tauri
          args: ${{ matrix.args }}
          tagName: v__VERSION__
          releaseName: Claudio v__VERSION__
          releaseBody: See the assets below to download and install Claudio for your platform.
          releaseDraft: true
          prerelease: false
