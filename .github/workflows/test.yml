name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - run: dotnet restore

      - run: dotnet build --no-restore

      - name: Run tests with coverage
        run: >
          dotnet run --project tests/Claudio.Api.Tests --no-build
          --coverage
          --coverage-output ./TestResults/
          --coverage-output-format cobertura

      - name: Generate coverage report
        if: always()
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: TestResults/coverage.cobertura.xml
          targetdir: TestResults/report
          reporttypes: MarkdownSummaryGithub;Html

      - name: Add coverage to job summary
        if: always()
        run: cat TestResults/report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: TestResults/report
          retention-days: 30
