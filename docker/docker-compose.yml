services:
  claudio:
    image: ghcr.io/lmrisdal/claudio:latest
    container_name: claudio
    ports:
      - "8080:8080"
    volumes:
      - claudio-data:/config
      - /path/to/games:/games:ro
    user: "1000:1000"
    environment:
      # - CLAUDIO_PORT=8080
      # Multiple origins should be comma-separated with no spaces.
      # - CLAUDIO_BROWSER_ORIGINS=https://claudio.example.com,https://staging.example.com
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  claudio-data:
