<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claudio Emulator</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background:
          radial-gradient(
            circle at top,
            rgba(255, 200, 87, 0.18),
            transparent 38%
          ),
          linear-gradient(180deg, #0a0e14 0%, #020305 100%);
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: transparent;
        color: #edf2f7;
      }

      #game {
        width: 100%;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const core = params.get("core");
      const gameUrl = params.get("gameUrl");

      async function loadScript(url) {
        await new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = url;
          script.onload = resolve;
          script.onerror = () =>
            reject(new Error(`Failed to load emulator script: ${url}`));
          document.head.appendChild(script);
        });
      }

      async function loadStyle(url) {
        await new Promise((resolve, reject) => {
          const link = document.createElement("link");
          link.rel = "stylesheet";
          link.href = url;
          link.onload = resolve;
          link.onerror = () =>
            reject(new Error(`Failed to load emulator stylesheet: ${url}`));
          document.head.appendChild(link);
        });
      }

      async function bootstrap() {
        if (!core || !gameUrl) {
          document.body.innerHTML =
            "<p style='padding:24px;font:16px IBM Plex Sans,sans-serif;color:#fca5a5'>Missing emulator launch parameters.</p>";
          return;
        }

        window.EJS_player = "#game";
        window.EJS_core = core;
        window.EJS_gameUrl = gameUrl;
        window.EJS_gameName = params.get("gameName") || "Game";
        window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
        window.EJS_startOnLoaded = true;
        window.EJS_color = "#f6c247";
        if (params.get("threads") === "1") {
          window.EJS_threads = true;
        }

        // Patch WebGL context creation to preserve the drawing buffer,
        // so canvas.toBlob() captures the actual frame instead of black.
        var origGetContext = HTMLCanvasElement.prototype.getContext;
        HTMLCanvasElement.prototype.getContext = function (type, attrs) {
          if (type === "webgl" || type === "webgl2") {
            attrs = Object.assign({}, attrs, { preserveDrawingBuffer: true });
          }
          return origGetContext.call(this, type, attrs);
        };

        // Listen for messages from parent window
        window.addEventListener("message", function (event) {
          if (!event.data || !event.data.type) return;
          var gm = window.EJS_emulator && window.EJS_emulator.gameManager;
          if (!gm) return;

          if (event.data.type === "claudio:requestSaveState") {
            // Defer to next frame so the GPU has a
            // fully composited buffer ready to read back.
            requestAnimationFrame(function () {
              var state = gm.getState();

              var canvas = document.querySelector("#game canvas");
              if (canvas) {
                // Use createImageBitmap + OffscreenCanvas to encode
                // the PNG off the main thread when possible.
                if (typeof OffscreenCanvas !== "undefined") {
                  createImageBitmap(canvas).then(function (bmp) {
                    var oc = new OffscreenCanvas(bmp.width, bmp.height);
                    var ctx = oc.getContext("2d");
                    ctx.drawImage(bmp, 0, 0);
                    bmp.close();
                    return oc.convertToBlob({ type: "image/png" });
                  }).then(function (blob) {
                    return blob.arrayBuffer();
                  }).then(function (buf) {
                    var stateArr = new Uint8Array(state.buffer || state);
                    var ssArr = new Uint8Array(buf);
                    window.parent.postMessage({
                      type: "claudio:stateData",
                      state: stateArr,
                      screenshot: ssArr,
                    }, "*", [stateArr.buffer, ssArr.buffer]);
                  });
                } else {
                  // Fallback for browsers without OffscreenCanvas
                  canvas.toBlob(function (blob) {
                    var reader = new FileReader();
                    reader.onload = function () {
                      var stateArr = new Uint8Array(state.buffer || state);
                      var ssArr = new Uint8Array(reader.result);
                      window.parent.postMessage({
                        type: "claudio:stateData",
                        state: stateArr,
                        screenshot: ssArr,
                      }, "*", [stateArr.buffer, ssArr.buffer]);
                    };
                    reader.readAsArrayBuffer(blob);
                  }, "image/png");
                }
              } else {
                var stateArr = new Uint8Array(state.buffer || state);
                window.parent.postMessage({
                  type: "claudio:stateData",
                  state: stateArr,
                  screenshot: new Uint8Array(0),
                }, "*", [stateArr.buffer]);
              }
            });
          }

          if (event.data.type === "claudio:loadState") {
            var stateData = new Uint8Array(event.data.state);
            gm.loadState(stateData);
          }
        });

        try {
          await loadScript("https://cdn.emulatorjs.org/stable/data/emulator.min.js");
          await loadStyle("https://cdn.emulatorjs.org/stable/data/emulator.min.css");

          const config = {
            gameUrl: window.EJS_gameUrl,
            dataPath: window.EJS_pathtodata,
            system: window.EJS_core,
            gameName: window.EJS_gameName,
            color: window.EJS_color,
            startOnLoad: window.EJS_startOnLoaded,
            threads: window.EJS_threads,
          };

          window.EJS_emulator = new window.EmulatorJS(window.EJS_player, config);
        } catch (error) {
          console.error(error);
          document.body.innerHTML =
            "<p style='padding:24px;font:16px IBM Plex Sans,sans-serif;color:#fca5a5'>Failed to load emulator assets.</p>";
        }
      }

      void bootstrap();
    </script>
  </body>
</html>
