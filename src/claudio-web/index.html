<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="color-scheme" content="dark light" />
    <script>
      (function () {
        var t = localStorage.getItem("theme") || "system";
        var light =
          t === "light" || (t === "system" && matchMedia("(prefers-color-scheme: light)").matches);
        if (light) {
          document.documentElement.classList.add("light");
          document.querySelector('meta[name="theme-color"]').content = "#f8f8fa";
          document.querySelector('meta[name="color-scheme"]').content = "light";
        } else {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <title>Claudio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      if (import.meta.env?.PROD && "serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js").catch((error) => {
          console.error("Service worker registration failed:", error);
        });
      }
    </script>
  </body>
</html>
