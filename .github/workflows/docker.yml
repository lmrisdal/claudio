name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "src/**"
      - "tests/**"
      - "frontend/**"
      - "docker/**"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "Claudio.slnx"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - run: dotnet restore

      - run: dotnet build --no-restore

      - name: Run tests
        run: dotnet run --project tests/Claudio.Api.Tests --no-build

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build smoke test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          platforms: linux/amd64
          tags: claudio:smoke

      - name: Smoke test container startup
        run: |
          docker run -d --rm --name claudio-smoke -p 18080:8080 \
            -e CLAUDIO_DISABLE_AUTH=true \
            claudio:smoke

          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:18080/health >/dev/null; then
              exit 0
            fi

            if ! docker ps --format '{{.Names}}' | grep -qx 'claudio-smoke'; then
              docker logs claudio-smoke
              exit 1
            fi

            sleep 2
          done

          docker logs claudio-smoke
          exit 1

      - name: Stop smoke test container
        if: always()
        run: docker rm -f claudio-smoke || true

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
