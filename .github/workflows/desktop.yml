name: Build Desktop App

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "src/claudio-desktop/**"
      - "frontend/**"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: windows-latest
            target: aarch64-pc-windows-msvc
          - platform: macos-latest
            target: universal-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src/claudio-desktop -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install and build frontend
        run: npm ci && npm run build
        working-directory: frontend
        env:
          TAURI_ENV_PLATFORM: true

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src/claudio-desktop
          tauriScript: ../../frontend/node_modules/.bin/tauri
          args: --target ${{ matrix.target }} --config '{"build":{"beforeBuildCommand":""}}'
          tagName: v__VERSION__
          releaseName: Claudio v__VERSION__
          releaseBody: See the assets below to download and install Claudio for your platform.
          releaseDraft: true
          prerelease: false
